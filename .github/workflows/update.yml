name: Update KMA 2026 Schedule

on:
  schedule:
    - cron: "0 18 * * *"   # 한국시간 새벽 3시
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install node-fetch

      - run: node scripts/fetch_kma_2026.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add events_2026.json
          git commit -m "Auto update 2026 KMA schedule" || exit 0
          git push
